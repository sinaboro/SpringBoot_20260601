<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-shield-lock"></i> 로그인</h4>
                </div>
                <div class="card-body">
                    <!-- 로그인 실패 시: /auth/login?error=true → param.error 존재 -->
                    <div th:if="${param.error}" class="alert alert-danger">
                        아이디 또는 비밀번호가 올바르지 않습니다.
                    </div>
                    <!-- 로그아웃 후: /auth/login?logout=true → param.logout 존재 -->
                    <div th:if="${param.logout}" class="alert alert-info">
                        로그아웃 되었습니다.
                    </div>
                    <!-- 회원가입 후: /auth/login?registered=true 로 리다이렉트됨 -->
                    <div th:if="${param.registered}" class="alert alert-success">
                        회원가입이 완료되었습니다. 로그인하세요.
                    </div>
                    <!-- ★ th:action: CSRF 토큰을 자동으로 form에 삽입 -->
                    <!-- ★ loginProcessingUrl과 action URL이 반드시 일치해야 합니다 -->
                    <form th:action="@{/auth/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">아이디</label>
                            <!-- name="username": Security가 이 이름으로 값을 읽습니다 (변경 불가) -->
                            <input type="text" name="userId" class="form-control"
                                   placeholder="아이디를 입력하세요" autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">비밀번호</label>
                            <!-- name="password": Security가 이 이름으로 값을 읽습니다 (변경 불가) -->
                            <input type="password" name="pwd" class="form-control"
                                   placeholder="비밀번호를 입력하세요">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right"></i> 로그인
                        </button>
                    </form>
                    <div class="mt-3 text-center">
                        <a th:href="@{/auth/register}">계정이 없으신가요? 회원가입</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">

</script>
</body></html>
