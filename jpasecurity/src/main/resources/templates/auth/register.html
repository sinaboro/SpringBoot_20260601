<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>нҡҢмӣҗк°Җмһ…</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="bi bi-person-plus"></i> нҡҢмӣҗк°Җмһ…</h4>
                </div>
                <div class="card-body">
                    <!-- м„ңлІ„м—җм„ң м „лӢ¬н•ң мҳӨлҘҳ л©”мӢңм§Җ (м•„мқҙл””В·мқҙл©”мқј мӨ‘ліө) н‘ңмӢң -->
                    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
                    <!-- th:object: нҸјмқ„ RegisterDtoмҷҖ м—°кІ° -->
                    <!-- th:field: н•„л“ңлӘ… мһҗлҸҷ л§Өн•‘ + id/name мҶҚм„ұ мһҗлҸҷ мғқм„ұ -->
                    <form th:action="@{/auth/register}" th:object="${registerDto}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">мқҙлҰ„ <span class="textdanger">*</span></label>
                            <!-- th:classappend: кІҖмҰқ мҳӨлҘҳ мӢң is-invalid нҒҙлһҳмҠӨ м¶”к°Җ (л№Ёк°„ н…Ңл‘җлҰ¬) -->
                            <input type="text" th:field="*{name}" class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   placeholder="мӢӨм ң мқҙлҰ„ (нҷҚкёёлҸҷ)">
                            <!-- th:errors: @NotBlank л“ұ кІҖмҰқ мӢӨнҢЁ л©”мӢңм§Җ мһҗлҸҷ м¶ңл Ҙ -->
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">мқҙл©”мқј <span class="textdanger">*</span></label>
                            <input type="email" th:field="*{email}" class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">м „нҷ”лІҲнҳё <span class="text-muted">(м„ нғқ)</span></label>
                            <input type="text" th:field="*{phone}" class="form-control"
                                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                   placeholder="010-1234-5678">
                            <div class="invalid-feedback" th:errors="*{phone}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">м•„мқҙл”” <span class="textdanger">*</span></label>
                            <input type="text" th:field="*{username}" class="form-control"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   placeholder="лЎңк·ёмқёмҡ© ID вҖ” мҳҒл¬ёВ·мҲ«мһҗ 4~20мһҗ">
                            <!-- м•„мқҙл””мҷҖ мқҙлҰ„мқҳ м°ЁмқҙлҘј м•ҲлӮҙн•ҳлҠ” м„ӨлӘ… л¬ёкө¬ -->
                            <div class="form-text">мӢӨм ң мқҙлҰ„мқҙ м•„лӢҢ лЎңк·ёмқёмҡ© IDмһ…лӢҲлӢӨ. (мҳҲ: hong123)</div>
                            <div class="invalid-feedback" th:errors="*{username}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">л№„л°ҖлІҲнҳё <span class="textdanger">*</span></label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   placeholder="4мһҗ мқҙмғҒ">
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-person-check"></i> к°Җмһ…н•ҳкё°
                            </button>
                            <a th:href="@{/auth/login}" class="btn btn-outline-secondary">м·ЁмҶҢ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
