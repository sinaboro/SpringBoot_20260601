# src/main/resources/application.yml
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true # http://localhost:8080/h2-console 접속 가능
  jpa:
    hibernate:
      ddl-auto: create-drop # 앱 시작 시 테이블 생성, 종료 시 삭제
    show-sql: true # 실행 SQL을 콘솔에 출력
    properties:
      hibernate:
        format_sql: true # SQL 들여쓰기 출력