spring.application.name=member
server.port=8080

# ─── DataSource ──────────────────────────────────────────────────
#spring.datasource.url=jdbc:mysql://localhost:3306/memberdb?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.url=jdbc:mysql://localhost:3306/memberdb?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=test
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── MyBatis ─────────────────────────────────────────────────────
# XML Mapper 파일 위치 지정
mybatis.mapper-locations=classpath:mapper/*.xml
# 패키지 별칭 설정 (XML에서 전체 경로 대신 클래스명만 사용 가능)
mybatis.type-aliases-package=com.example.member.entity


# 캐시 비활성화 (개발 중 수정 즉시 반영)
spring.thymeleaf.cache=false
# 템플릿 파일 위치 (기본값 - 변경 불필요)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
